name: Release Starlight

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-docs:
    uses: gesslar/Maint/.github/workflows/ReleaseStarlight.yaml@main
    with:
      docs_directory: "dist"
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
      SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
      SFTP_TARGET_DIR: ${{ secrets.SFTP_TARGET_DIR }}
